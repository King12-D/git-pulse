name = "gitpulse"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[build]
command = "cd apps/web && pnpm build && npx @opennextjs/cloudflare"
cwd = "apps/web"

[[d1_databases]]
binding = "DB"
database_name = "gitpulse"
database_id = "your-database-id"

[vars]
NODE_ENV = "production"
